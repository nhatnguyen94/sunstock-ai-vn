# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name sunstock-local.dev;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name sunstock-local.dev;

    root /var/www/html/public;
    index index.php;

    # SSL certificates (generated by mkcert)
    ssl_certificate     /etc/nginx/ssl/sunstock-local.dev.pem;
    ssl_certificate_key /etc/nginx/ssl/sunstock-local.dev-key.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # File upload limits (match php.ini)
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/sunstock_access.log;
    error_log  /var/log/nginx/sunstock_error.log;

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass            php:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    300;
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
    }

    # Static asset caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Deny hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
